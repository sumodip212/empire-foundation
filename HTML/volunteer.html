<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Volunteer | Empire Foundation</title> 
 
<link rel="stylesheet" href="../CSS/styles.css"> 
 
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"> 
 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
</head> 
 
<body> 
 
<!-- Navbar --> 
<nav class="navbar"> 
    <div class="nav-container"> 
        <div class="logo"> 
            <div class="logo-icon"> 
                <a href="../index.html"><i class="fas fa-hands-helping"></i></a> 
            </div> 
            <div class="logo-text"> 
                <span class="logo-main">EMPIRE</span> 
                <span class="logo-sub">FOUNDATION</span> 
            </div> 
        </div> 
    </div> 
</nav> 
 
<!-- Volunteer Section --> 
<section class="contact" style="padding-top:60px; min-height:100vh; display:flex; align-items:center;">
    <div class="container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;"> 
 
        <!-- Back Button --> 
        <a href="../index.html" class="btn btn-secondary back-btn" style=" 
            position:fixed; 
            top:70px; 
            left:16px; 
            border-radius:30px; 
            padding:6px 14px; 
            font-size:11px;
            margin-top: 26px; 
            z-index:10;
        "> 
        <i class="fas fa-chevron-left"></i> Back 
        </a> 
 
        <!-- Heading --> 
        <div class="section-header" style="text-align:center; margin-bottom:6px;"> 
            <span class="section-tag" style="font-size:11px; padding:3px 10px; margin-top:36px;">Join Us</span> 
            <h2 class="section-title" style="font-size:22px; margin-bottom:3px;">Become a <span class="highlight">Volunteer</span></h2> 
            <p class="section-subtitle" style="font-size:12px; margin:0;">Be a part of change and help communities grow</p> 
        </div> 
 
        <!-- Form Card --> 
        <div class="contact-form" style="max-width:380px; width:100%; padding:18px 20px; box-sizing:border-box;"> 
             
            <form id="volunteerForm"> 
 
                <div class="form-group" style="margin-bottom:10px;"> 
                    <input type="text" id="v_name" required> 
                    <label>Full Name</label> 
                </div> 
 
                <div class="form-group" style="margin-bottom:10px;"> 
                    <input type="email" id="v_email" required> 
                    <label>Email Address</label> 
                </div> 
 
                <div class="form-group" style="margin-bottom:10px;"> 
                    <input type="tel" id="v_phone" required> 
                    <label>Phone Number</label> 
                </div> 
 
                <div class="form-group" style="margin-bottom:10px;"> 
                    <input type="text" id="v_city" required> 
                    <label>City</label> 
                </div> 
 
                <div class="form-group" style="margin-bottom:12px;"> 
                    <textarea id="v_whyJoin" style="height:65px;"></textarea> 
                    <label>Why do you want to join (optional)</label> 
                </div> 
 
                <button type="submit" class="btn btn-primary" style="width:100%; padding:10px; font-size:13px;"> 
                    <i class="fas fa-hand-holding-heart"></i> 
                    Apply Now 
                </button> 
 
            </form> 
 
            <p id="volunteerMsg" style="margin-top:8px; text-align:center; font-size:13px;"></p> 
 
        </div> 
 
    </div> 
</section> 
 
<!-- Footer --> 
<footer class="footer"> 
    <div class="container"> 
        <div class="footer-bottom" style="justify-content:center;"> 
            <p style="font-size:12px;">&copy; 2026 THE EMPIRE FOUNDATION. All Rights Reserved.</p> 
        </div> 
    </div> 
</footer> 
 
<script src="../JS/script.js"></script> 
 
</body> 
</html>
