<section class="contact" style="padding-top:120px; min-height:100vh;">

    </div>

    <!-- Form -->
    <div class="contact-form" style="max-width:500px; width:100%; margin-top:20px;">
        
        <form id="volunteerForm">

            <div class="form-group">
                <input type="text" id="v_name" required>
                <label>Full Name</label>
            </div>

            <div class="form-group">
                <input type="email" id="v_email" required>
                <label>Email Address</label>

            <div class="form-group">
