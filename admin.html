<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="CSS/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<div class="container">

<header>
  <h1>Admin Dashboard</h1>
  <nav class="nav-links">
    <a href="#" class="active" onclick="showTab('volunteers')">Volunteers</a>
    <a href="#" onclick="showTab('contacts')">Contacts</a>
    <a href="#" onclick="showTab('newsletter')">Newsletter</a>
    <a href="#" onclick="showTab('blood')">Blood</a>
    <a href="#" onclick="showTab('sos')">SOS</a>
  </nav>
</header>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-number" id="volunteerCount">-</div>
    <div class="stat-label">Volunteers</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="contactCount">-</div>
    <div class="stat-label">Contacts</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="subscriberCount">-</div>
    <div class="stat-label">Subscribers</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="bloodCount">-</div>
    <div class="stat-label">Blood Donors</div>
  </div>
</div>

<!-- TABS -->
<div class="tab-content active" id="volunteers"><div id="volunteersTable"></div></div>
<div class="tab-content" id="contacts"><div id="contactsTable"></div></div>
<div class="tab-content" id="newsletter"><div id="newsletterTable"></div></div>
<div class="tab-content" id="blood"><div id="bloodTable"></div></div>

<div class="tab-content" id="sos">
  <div class="data-section">
    <div class="section-header">
      <h2>🚨 SOS Alerts</h2>
      <button onclick="loadSOS()">Refresh</button>
    </div>
    <div id="sosTable"></div>
  </div>
</div>

</div>

<a href="index.html" class="back-link">← Back to Website</a>

<script src="JS/admin.js"></script>

</body>
</html>
